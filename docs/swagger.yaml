definitions:
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  sys.CasbinAddRequest:
    properties:
      method:
        type: string
      role_id:
        type: string
      type:
        enum:
        - p
        type: string
      uri:
        type: string
    required:
    - method
    - role_id
    - type
    - uri
    type: object
  sys.DeptAddRequest:
    properties:
      fullname:
        type: string
      num:
        type: integer
      pid:
        type: integer
      pids:
        type: string
      tips:
        type: string
    required:
    - fullname
    - num
    - pid
    - pids
    - tips
    type: object
  sys.DeptDeleteRequest:
    properties:
      id:
        type: integer
    type: object
  sys.GenerateVerifyRequest:
    properties:
      login_id:
        type: string
      token:
        type: string
    required:
    - login_id
    - token
    type: object
  sys.LoginByPasswordRequest:
    properties:
      captcha_answer:
        type: string
      captcha_id:
        type: string
      login_id:
        type: string
      password:
        type: string
    required:
    - login_id
    - password
    type: object
  sys.MenuRequest:
    properties:
      code:
        type: string
      icon:
        type: string
      id:
        type: integer
      is_menu:
        type: integer
      levels:
        type: integer
      name:
        type: string
      p_code:
        type: string
      p_codes:
        type: string
      sort:
        type: integer
      status:
        type: integer
      tips:
        type: string
      url:
        type: string
    required:
    - code
    - icon
    - id
    - is_menu
    - levels
    - name
    - p_code
    - p_codes
    - sort
    - status
    - tips
    - url
    type: object
  sys.ResetByEmailRequest:
    properties:
      email:
        type: string
      required:
        type: string
      verify_code:
        type: string
    required:
    - email
    - verify_code
    type: object
  sys.RoleAddRequest:
    properties:
      deptid:
        type: integer
      name:
        type: string
      num:
        type: integer
      pid:
        type: integer
      tips:
        type: string
      version:
        type: integer
    required:
    - deptid
    - name
    - num
    - pid
    - tips
    - version
    type: object
  sys.RoleDeleteRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  sys.RoleMenuRequest:
    properties:
      menu_ids:
        items:
          type: integer
        type: array
      role_id:
        type: integer
    required:
    - menu_ids
    - role_id
    type: object
  sys.SignupRequest:
    properties:
      dept_id:
        type: integer
      email:
        type: string
      name:
        type: string
      password:
        type: string
      password_confirm:
        type: string
      phone:
        type: string
      role_id:
        type: integer
      verify_code:
        type: string
    required:
    - dept_id
    - email
    - name
    - password
    - password_confirm
    - phone
    - role_id
    - verify_code
    type: object
  sys.UserUpdateEmailRequest:
    properties:
      email:
        type: string
      verify_code:
        type: string
    required:
    - email
    - verify_code
    type: object
  sys.UserUpdatePasswordRequest:
    properties:
      new_password:
        type: string
      new_password_confirm:
        type: string
      password:
        type: string
    required:
    - new_password
    - new_password_confirm
    - password
    type: object
  sys.UserUpdatePhoneRequest:
    properties:
      phone:
        type: string
      verify_code:
        type: string
    required:
    - phone
    - verify_code
    type: object
  sys.UserUpdateProfileRequest:
    properties:
      introduction:
        type: string
      name:
        type: string
    required:
    - introduction
    - name
    type: object
  sys.VerifyActivateOtpRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  sys.VerifyCodeEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
